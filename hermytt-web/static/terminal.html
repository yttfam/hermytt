<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>hermytt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a0a;
    font-family: monospace;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding-top: env(safe-area-inset-top, 0px);
  }
  #bar {
    background: #1a1a2e;
    color: #7f7f9f;
    padding: 6px 14px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2a3e;
    flex-shrink: 0;
  }
  #bar .left { display: flex; align-items: center; gap: 12px; }
  #bar .name { color: #c0c0e0; font-weight: bold; }
  #bar a { color: #4a4a6e; text-decoration: none; transition: color 0.15s; }
  #bar a:hover { color: #60a5fa; }
  #bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  #bar .dot.on { background: #4ade80; }
  #tabs {
    background: #12121f;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid #2a2a3e;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 6px 16px;
    color: #6f6f8f;
    cursor: pointer;
    border-right: 1px solid #1a1a2e;
    font-size: 13px;
    white-space: nowrap;
    user-select: none;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { background: #1a1a2e; color: #9f9fbf; }
  .tab.active { background: #0a0a0a; color: #e0e0e0; border-bottom: 2px solid #60a5fa; }
  .tab .close { opacity: 0; font-size: 11px; color: #6f6f8f; transition: opacity 0.15s; }
  .tab:hover .close { opacity: 1; }
  .tab .close:hover { color: #ff6b6b; }
  #new-tab {
    padding: 6px 12px;
    color: #4a4a6e;
    cursor: pointer;
    font-size: 16px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  #new-tab:hover { color: #60a5fa; }
  #terminals { flex: 1; position: relative; min-height: 0; overflow: hidden; }
  .term-container { position: absolute; inset: 0; display: none; }
  .term-container.active { display: block; }
  .term-container canvas { width: 100%; height: 100%; }
  #mobile-input {
    display: none;
    background: #12121f;
    border-top: 1px solid #2a2a3e;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom, 0px));
    flex-shrink: 0;
  }
  #mobile-input form { display: flex; gap: 6px; }
  #mobile-input input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #2a2a3e;
    color: #e0e0e0;
    padding: 8px 10px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace;
    font-size: 14px;
    border-radius: 4px;
    outline: none;
  }
  #mobile-input input:focus { border-color: #60a5fa; }
  #mobile-input button {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    color: #9f9fbf;
    padding: 8px 14px;
    font-family: monospace;
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
  }
  #mobile-input button:active { background: #2a2a3e; }
  .mobile #mobile-input { display: block; }
  .mobile .tab .close { opacity: 1; }
  .mobile #bar { padding: 4px 10px; font-size: 12px; }
  .mobile .tab { padding: 4px 10px; font-size: 12px; }
</style>
</head>
<body>
<div id="bar">
  <div class="left">
    <span class="name">hermytt</span>
    <a href="/admin">admin</a>
  </div>
  <span><span class="dot" id="status"></span><span id="status-text">ready</span></span>
</div>
<div id="tabs"><div id="new-tab" title="new session">+</div></div>
<div id="terminals"></div>
<div id="mobile-input">
  <form id="mobile-form">
    <input type="text" id="mobile-text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type command...">
    <button type="submit">&#x23CE;</button>
    <button type="button" id="btn-ctrl-c" style="color:#ff6b6b">^C</button>
    <button type="button" id="btn-tab">&#x21E5;</button>
  </form>
</div>
<script type="module">
import init, { Terminal } from '/vendor/crytter_wasm.js';

try {
  await init('/vendor/crytter_wasm_bg.wasm');
  console.log('[hermytt] WASM initialized');
} catch (e) {
  console.error('[hermytt] WASM init failed:', e);
  document.getElementById('status-text').textContent = 'WASM init failed';
}

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

const urlToken = new URLSearchParams(location.search).get('token');
if (urlToken) {
  sessionStorage.setItem('hermytt-token', urlToken);
  const clean = new URL(location);
  clean.searchParams.delete('token');
  history.replaceState(null, '', clean);
}
const TOKEN = sessionStorage.getItem('hermytt-token') || '';

const sessions = new Map();
let activeId = null;

function fitAndResize(session) {
  if (!session) return;
  session.term.fit();
  if (session.ws && session.ws.readyState === WebSocket.OPEN) {
    session.ws.send(JSON.stringify({ resize: [session.term.cols, session.term.rows] }));
  }
}

function authHeaders() {
  const h = {};
  if (TOKEN) h['X-Hermytt-Key'] = TOKEN;
  return h;
}

async function api(path, opts = {}) {
  return fetch(path, { ...opts, headers: { ...authHeaders(), ...opts.headers } });
}

async function fetchSessions() {
  const res = await api('/sessions');
  if (!res.ok) return [];
  const data = await res.json();
  return data.sessions.map(s => s.id);
}

async function createSession() {
  const res = await api('/session', { method: 'POST' });
  if (!res.ok) return null;
  const data = await res.json();
  return data.id;
}

function addSession(id) {
  if (sessions.has(id)) { switchTo(id); return; }

  const container = document.createElement('div');
  container.className = 'term-container';
  container.id = `term-${id}`;
  document.getElementById('terminals').appendChild(container);

  const term = new Terminal({
    cols: 80,
    rows: 24,
    fontSize: isMobile ? 12 : 15,
    fontFamily: "'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace",
  });
  term.open(container);

  const session = { id, term, ws: null, container };
  sessions.set(id, session);
  connectSession(session);
  addTab(id);
  switchTo(id);
}

function connectSession(session) {
  const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${scheme}://${location.host}/ws/${session.id}`);
  let authed = false;

  ws.onopen = () => {
    console.log('[hermytt] WS open, TOKEN:', TOKEN ? 'set' : 'empty');
    if (TOKEN) {
      ws.send(TOKEN);
    } else {
      // No auth configured — immediately ready.
      authed = true;
      if (activeId === session.id) updateStatus(true, session.id.slice(0,8));
      fitAndResize(session);
    }
  };

  ws.onmessage = (e) => {
    if (!authed) {
      console.log('[hermytt] WS msg (pre-auth):', e.data.slice(0, 50));
      if (e.data === 'auth:ok') {
        authed = true;
        if (activeId === session.id) updateStatus(true, session.id.slice(0,8));
        fitAndResize(session);
        return;
      }
      return;
    }
    // write() returns device query responses (DA1, CPR, etc.)
    const response = session.term.write(e.data);
    if (response) ws.send(response);
  };

  ws.onclose = (e) => {
    if (e.code === 4401) {
      updateStatus(false, 'unauthorized');
      return;
    }
    if (sessions.has(session.id)) {
      if (activeId === session.id) updateStatus(false, 'reconnecting...');
      setTimeout(() => { if (sessions.has(session.id)) connectSession(session); }, 2000);
    }
  };

  ws.onerror = () => ws.close();

  // Keyboard input — attach to container for focus
  session.container.tabIndex = 0;
  session.container.addEventListener('keydown', (e) => {
    if (ws.readyState !== WebSocket.OPEN || !authed) return;
    const data = session.term.handleKeyEvent(e);
    if (data) {
      ws.send(data);
      e.preventDefault();
    }
  });

  // Mouse wheel scroll
  session.container.addEventListener('wheel', (e) => {
    const lines = Math.round(e.deltaY / 20);
    if (lines > 0) session.term.scrollDown(Math.abs(lines));
    else if (lines < 0) session.term.scrollUp(Math.abs(lines));
    e.preventDefault();
  }, { passive: false });

  // Title changes
  session.term.onTitleChange((title) => {
    if (activeId === session.id) document.title = title || 'hermytt';
  });

  session.ws = ws;
}

function addTab(id) {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.dataset.id = id;
  tab.innerHTML = `<span>${id.slice(0, 8)}</span><span class="close">\u00d7</span>`;
  tab.addEventListener('click', (e) => {
    e.target.classList.contains('close') ? removeSession(id) : switchTo(id);
  });
  document.getElementById('new-tab').before(tab);
}

function switchTo(id) {
  activeId = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.term-container').forEach(c => c.classList.remove('active'));
  const tab = document.querySelector(`.tab[data-id="${id}"]`);
  const container = document.getElementById(`term-${id}`);
  if (tab) tab.classList.add('active');
  if (container) container.classList.add('active');
  const session = sessions.get(id);
  if (session) {
    setTimeout(() => {
      fitAndResize(session);
      // Second fit after render settles
      setTimeout(() => fitAndResize(session), 200);
    }, 50);
    if (!isMobile) session.container.focus();
    const connected = session.ws && session.ws.readyState === WebSocket.OPEN;
    updateStatus(connected, connected ? id.slice(0,8) : 'connecting...');
  }
}

function removeSession(id) {
  const session = sessions.get(id);
  if (!session) return;
  if (session.ws) session.ws.close();
  session.container.remove();
  sessions.delete(id);
  document.querySelector(`.tab[data-id="${id}"]`)?.remove();
  if (activeId === id) {
    const remaining = [...sessions.keys()];
    remaining.length > 0 ? switchTo(remaining.at(-1)) : (activeId = null, updateStatus(false, 'no sessions'));
  }
}

function updateStatus(on, text) {
  document.getElementById('status').classList.toggle('on', on);
  document.getElementById('status-text').textContent = text;
}

document.getElementById('new-tab').addEventListener('click', async () => {
  const id = await createSession();
  if (id) addSession(id);
});

window.addEventListener('resize', () => {
  if (activeId) fitAndResize(sessions.get(activeId));
});

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey) {
    const ids = [...sessions.keys()], idx = ids.indexOf(activeId);
    if (e.key === 'T') { e.preventDefault(); document.getElementById('new-tab').click(); }
    if (e.key === 'W' && activeId) { e.preventDefault(); removeSession(activeId); }
    if (e.key === '[' && idx > 0) { e.preventDefault(); switchTo(ids[idx - 1]); }
    if (e.key === ']' && idx < ids.length - 1) { e.preventDefault(); switchTo(ids[idx + 1]); }
  }
});

// Mobile
if (isMobile) document.body.classList.add('mobile');
function fixHeight() {
  document.body.style.height = window.innerHeight + 'px';
  if (activeId) setTimeout(() => fitAndResize(sessions.get(activeId)), 50);
}
fixHeight();
window.addEventListener('resize', fixHeight);

const mobileText = document.getElementById('mobile-text');
function mobileSend(data) {
  if (!activeId) return false;
  const session = sessions.get(activeId);
  if (!session?.ws || session.ws.readyState !== WebSocket.OPEN) {
    mobileText.placeholder = 'not connected...';
    return false;
  }
  session.ws.send(data);
  return true;
}
document.getElementById('mobile-form').addEventListener('submit', (e) => {
  e.preventDefault();
  if (mobileText.value && mobileSend(mobileText.value + '\r')) mobileText.value = '';
});
mobileText.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (mobileText.value && mobileSend(mobileText.value + '\r')) mobileText.value = '';
  }
});
document.getElementById('btn-ctrl-c').addEventListener('click', () => mobileSend('\x03'));
document.getElementById('btn-tab').addEventListener('click', () => {
  if (mobileText.value) { mobileSend(mobileText.value + '\t'); mobileText.value = ''; }
  else mobileSend('\t');
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (activeId) setTimeout(() => fitAndResize(sessions.get(activeId)), 100);
  });
}

// Render loop — crytter batches writes, render() draws to canvas
function renderLoop() {
  sessions.forEach(s => s.term.render());
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// Boot
console.log('[hermytt] crytter loaded, fetching sessions...');
const ids = await fetchSessions();
console.log('[hermytt] sessions:', ids);
if (ids.length === 0) {
  const id = await createSession();
  if (id) addSession(id);
} else {
  ids.forEach(id => addSession(id));
}
</script>
</body>
</html>
